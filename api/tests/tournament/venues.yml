info:
  name: Get Venues
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:8000/tournament/venues

runtime:
  scripts:
    - type: tests
      code: |-
        test("status 200", function() {
          expect(res.status).to.equal(200);
        });
        test("returns data array", function() {
          expect(res.body.data).to.be.an("array");
        });
        test("has 16 venues", function() {
          expect(res.body.data.length).to.equal(16);
        });
        test("each venue has id, name, city, capacity", function() {
          res.body.data.forEach(function(v) {
            expect(v.id).to.be.a("string");
            expect(v.name).to.be.a("string");
            expect(v.country).to.be.a("string");
          });
        });
        test("Azteca is in the list", function() {
          var azteca = res.body.data.find(function(v) { return v.id === "azteca"; });
          expect(azteca).to.not.be.undefined;
          expect(azteca.capacity).to.be.at.least(87000);
        });
