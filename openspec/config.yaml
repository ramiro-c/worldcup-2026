# SDD Configuration — Copa 2026 (worldcup-2026)
# Auto-generated by sdd-init on 2026-06-23

project: worldcup-2026
label: Copa 2026
strict_tdd: true

context: >
  Web app para explorar el Mundial 2026 con fixture, grupos, cuadro eliminatorio,
  sedes y contexto histórico. Monorepo: API (FastAPI + httpx) y web (React 19 +
  TypeScript + Vite + Tailwind CSS v4). Datos de wheniskickoff (en vivo),
  openfootball (histórico) y StatsBomb (eventos). Sin datos commiteados — fetch
  dinámico. Deploy a Render (API) y Cloudflare Pages (web).

preflight:
  execution_mode: auto
  artifact_store: hybrid
  chained_pr_strategy: force-chained
  review_budget: 800

testing:
  strict_tdd: true
  runners:
    - name: pytest
      type: unit
      path: api
      command: uv run pytest
      layers: [unit, integration]
    - name: vitest
      type: unit
      path: web
      command: pnpm test:unit
      layers: [unit, integration]
    - name: playwright
      type: e2e
      path: web
      command: pnpm test
      layers: [e2e]
  coverage:
    available: false
  quality:
    linter:
      available: true
      command: cd web && pnpm lint
    type_checker:
      available: true
      command: cd web && npx tsc -b
    formatter:
      available: false

phase_rules:
  propose: required
  spec: required
  design: required
  tasks: required
  apply: required
  verify: required
  archive: required
