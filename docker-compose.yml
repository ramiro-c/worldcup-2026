services:
  api:
    build:
      context: api
      dockerfile_inline: |
        FROM python:3.13-slim
        WORKDIR /app
        COPY pyproject.toml uv.lock ./
        COPY --from=ghcr.io/astral-sh/uv:latest /uv /bin/uv
        RUN uv sync --frozen
        COPY . .
        CMD ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    restart: unless-stopped

  web:
    build:
      context: web
      dockerfile_inline: |
        FROM node:24-alpine
        WORKDIR /app
        COPY package.json pnpm-lock.yaml pnpm-workspace.yaml ./
        RUN corepack enable && CI=true pnpm install --frozen-lockfile --config.confirmModulesPurge=false
        COPY . .
        CMD ["pnpm", "dev", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_PROXY_TARGET=http://api:8000
      - CI=true